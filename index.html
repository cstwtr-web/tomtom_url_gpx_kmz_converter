<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#4682B4"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="TomTom GPX"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="description" content="Converti URL Google Maps in file GPX per TomTom MyDrive"/>
  <title>TomTom Route Converter</title>

  <script>
    // PWA Manifest con icona aggiornata (Bussola su bianco, fondo SteelBlue)
    const __manifest = {
      name: "TomTom Route Converter",
      short_name: "TomTom GPX",
      description: "Converti URL Google Maps in file GPX per TomTom MyDrive",
      start_url: "./",
      display: "standalone",
      background_color: "#4682B4",
      theme_color: "#4682B4",
      orientation: "portrait-primary",
      icons: [{
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%234682B4'/%3E%3Crect x='80' y='80' width='352' height='352' rx='80' fill='%23ffffff'/%3E%3Ccircle cx='256' cy='256' r='120' fill='none' stroke='%23F59E0B' stroke-width='8'/%3E%3Cpolygon points='256,160 275,240 256,256 237,240' fill='%23EF4444'/%3E%3Cpolygon points='256,352 237,272 256,256 275,272' fill='%2310B981'/%3E%3Ccircle cx='256' cy='256' r='15' fill='%23475569'/%3E%3C/svg%3E",
        sizes: "512x512",
        type: "image/svg+xml",
        purpose: "any maskable"
      }]
    };
    const __blob = new Blob([JSON.stringify(__manifest)], {type:'application/manifest+json'});
    const __link = document.createElement('link');
    __link.rel = 'manifest';
    __link.href = URL.createObjectURL(__blob);
    document.currentScript.parentNode.insertBefore(__link, document.currentScript);
  </script>
  
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%234682B4'/%3E%3Crect x='80' y='80' width='352' height='352' rx='80' fill='%23ffffff'/%3E%3Ccircle cx='256' cy='256' r='120' fill='none' stroke='%23F59E0B' stroke-width='8'/%3E%3Cpolygon points='256,160 275,240 256,256 237,240' fill='%23EF4444'/%3E%3Cpolygon points='256,352 237,272 256,256 275,272' fill='%2310B981'/%3E%3Ccircle cx='256' cy='256' r='15' fill='%23475569'/%3E%3C/svg%3E"/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:       #4682B4; /* SteelBlue */
      --bg2:      #3b6e99;
      --bg3:      #2e5677;
      --border:   #5a94c2;
      --border2:  #4a7da6;
      --accent:   #1D4ED8;
      --text:     #FFFFFF;
      --text2:    #e0e7ff;
      --radius:   14px;
      --safe-t:   env(safe-area-inset-top,    0px);
      --safe-b:   env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    .shell { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

    /* HEADER */
    .header {
      position: sticky; top: 0; z-index: 50;
      padding: calc(var(--safe-t) + 14px) 20px 14px;
      background: rgba(70, 130, 180, 0.95);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }
    .header-inner { max-width: 720px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
    
    /* Logo stile icona allegata */
    .logo {
      width: 42px; height: 42px; flex-shrink: 0;
      background: #fff; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 16px; /* Dimensioni corrette */
      color: #fff; line-height: 1.2;
    }
    .header-sub { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; }

    main { max-width: 720px; margin: 0 auto; width: 100%; padding: 20px 16px calc(20px + var(--safe-b)); }

    /* BANNER & INFO */
    .info {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius); padding: 14px; margin-bottom: 20px;
      font-size: 13px; line-height: 1.6; color: var(--text2);
    }

    /* CARD */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px; }

    /* INPUTS */
    .field { margin-bottom: 16px; position: relative; }
    .label { display: block; font-size: 10px; font-weight: 500; color: var(--text2); text-transform: uppercase; margin-bottom: 8px; }
    
    input {
      width: 100%; background: var(--bg3); border: 1.5px solid var(--border2);
      border-radius: 12px; padding: 14px; color: #fff; font-family: inherit; font-size: 14px; outline: none;
    }

    /* BOTTONE CONVERT - Spaziatura corretta */
    .btn-convert {
      width: 100%; background: #fff; color: var(--bg); border: none;
      border-radius: 14px; padding: 16px; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 12px; /* Spazio dal campo sopra */
    }

    .btn-download {
      width: 100%; background: #10B981; color: #fff; border: none; border-radius: 14px;
      padding: 16px; font-family: 'Syne', sans-serif; font-weight: 700; margin-top: 10px;
    }

    /* RISULTATI */
    #results { display:none; margin-top: 10px; }
    .wp-list { background:var(--bg3); border-radius:var(--radius); overflow:hidden; border:1px solid var(--border2); }
    .wp-row { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13px; display:flex; gap:10px; }

    @media (min-width: 640px) {
      .two-col { display: grid; grid-template-columns: 1fr auto; gap: 15px; align-items: flex-end; }
      .btn-convert { width: auto; margin-top: 0; padding: 13px 30px; }
    }
  </style>
</head>
<body>
<div class="shell">
  <header class="header">
    <div class="header-inner">
      <div class="logo">🧭</div>
      <div>
        <div class="header-title">TomTom Route Converter</div>
        <div class="header-sub">URL → GPX · MyDrive Compatible</div>
      </div>
    </div>
  </header>

  <main>
    <div class="info">
      Incolla l'URL della rotta creata su Google Maps. Riceverai un file <b>.gpx</b> pronto per il tuo TomTom.
    </div>

    <div class="card">
      <div class="two-col">
        <div class="field" style="margin-bottom:0">
          <label class="label">URL della rotta</label>
          <input type="url" id="urlIn" placeholder="Incolla l'URL qui...">
        </div>
        <button class="btn-convert" onclick="go()">
          <span id="bIcon">▶</span> Converti
        </button>
      </div>
      
      <div class="field" style="margin-top:20px;">
        <label class="label">Nome della rotta</label>
        <input type="text" id="nameIn" value="La mia rotta">
      </div>
    </div>

    <div id="results">
      <div class="wp-list" id="wpList"></div>
      <button class="btn-download" onclick="download()">⬇ Scarica file .gpx</button>
    </div>
  </main>
</div>

<script>
const $ = id => document.getElementById(id);

async function geocode(q) {
  const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
  const d = await r.json();
  if(!d.length) throw new Error('Non trovato: ' + q);
  return { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon), name: d[0].display_name.split(',')[0] };
}

let _gpx = '', _name = '';

async function go() {
  const url = $('urlIn').value.trim();
  if(!url) return;
  
  const icon = $('bIcon');
  icon.innerHTML = '...';
  
  try {
    const match = url.match(/maps\/dir\/([^\/]+)/);
    if(!match) throw new Error("URL non valido.");
    
    const stops = match[1].split('/').map(s => decodeURIComponent(s.replace(/\+/g,' '))).filter(s => s && !s.startsWith('@'));
    const wps = [];
    
    for(let s of stops) {
      wps.push(await geocode(s));
    }

    _name = $('nameIn').value || 'Rotta';
    const pts = wps.map(w => `<rtept lat="${w.lat}" lon="${w.lon}"><name>${w.name}</name></rtept>`).join('');
    _gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" xmlns="http://www.topografix.com/GPX/1/1"><rte><name>${_name}</name>${pts}</rte></gpx>`;
    
    const list = $('wpList'); list.innerHTML = '';
    wps.forEach((w,i) => { list.innerHTML += `<div class="wp-row"><b>${i+1}</b> ${w.name}</div>`; });

    $('results').style.display = 'block';
  } catch(e) {
    alert(e.message);
  } finally {
    icon.innerHTML = '▶';
  }
}

function download() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([_gpx], {type:'application/gpx+xml'}));
  a.download = _name + '.gpx';
  a.click();
}
</script>
</body>
</html>
